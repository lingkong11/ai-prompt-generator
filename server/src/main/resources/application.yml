server:
  port: 8082

spring:
  application:
    name: ai-prompt-generator
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  
  datasource:
    url: jdbc:h2:mem:prompt-generator;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
      path: /h2-console

# AI API配置
ai:
  api:
    url: https://api.deepseek.com/v1/chat/completions
    key: ${DP_AI_API_KEY:}
  model: deepseek-chat

# JWT配置
jwt:
  secret: ai-prompt-generator-jwt-secret-key-very-long-string-for-security-2026
  expiration: 86400000

logging:
  level:
    root: INFO
    com.ai.prompt: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
