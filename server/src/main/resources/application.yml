server:
  port: 8082

spring:
  application:
    name: ai-prompt-generator
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  
  datasource:
    url: jdbc:postgresql://localhost:5432/prompt-generator
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: ${POSTGRES_PASSWORD:} 
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  
# AI API配置
ai:
  api:
    url: https://api.deepseek.com/v1/chat/completions
    key: ${DP_AI_API_KEY:}
  model: deepseek-chat

# JWT配置
jwt:
  secret: ai-prompt-generator-jwt-secret-key-very-long-string-for-security-2026
  expiration: 86400000

logging:
  level:
    root: INFO
    com.ai.prompt: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
